<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>モックアップ｜プロフィール編集（生年月日対応版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        background: #fff7ed;
        color: #1f2937;
        -webkit-font-smoothing: antialiased;
      }
      input[type="date"],
      input[type="number"] {
        font-size: 16px;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div class="mx-auto max-w-md min-h-screen flex flex-col pb-24">
      <!-- ヘッダー -->
      <header class="px-6 pt-12 pb-4 border-b border-orange-200">
        <div class="flex items-center gap-3">
          <button class="text-orange-600 text-sm">← 戻る</button>
          <h1 class="text-base font-semibold text-zinc-900">プロフィール編集</h1>
        </div>
      </header>

      <!-- フォーム本体 -->
      <main class="flex-1 px-6 pt-6">
        <form class="flex flex-col gap-5">
          <!-- 性別 -->
          <fieldset>
            <legend class="text-sm font-medium text-zinc-700 mb-2">性別</legend>
            <div class="flex gap-3">
              <label class="flex-1 flex items-center justify-center gap-2 text-sm rounded-xl border border-orange-300 bg-orange-100 text-orange-700 font-medium py-3">
                <input type="radio" name="gender" checked class="accent-orange-500" />
                男性
              </label>
              <label class="flex-1 flex items-center justify-center gap-2 text-sm rounded-xl border border-orange-200 bg-white text-zinc-600 py-3">
                <input type="radio" name="gender" class="accent-orange-500" />
                女性
              </label>
            </div>
          </fieldset>

          <!-- 生年月日（NEW） -->
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-zinc-700 flex items-center gap-2">
              生年月日
              <span class="text-[10px] px-1.5 py-0.5 rounded bg-orange-500 text-white font-bold">NEW</span>
            </span>
            <input
              type="date"
              value="1990-01-01"
              min="1900-01-01"
              max="2020-12-31"
              class="rounded-xl border border-orange-300 bg-white px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-orange-400"
            />
            <span class="text-xs text-zinc-500 mt-0.5">
              年齢: <span class="font-semibold text-orange-600">36歳</span>（自動計算）
            </span>
          </label>

          <!-- 身長・体重 -->
          <div class="grid grid-cols-2 gap-3">
            <label class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-zinc-700">身長（cm）</span>
              <input
                type="number"
                value="170"
                step="0.1"
                class="rounded-xl border border-orange-300 bg-white px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-orange-400"
              />
            </label>
            <label class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-zinc-700">体重（kg）</span>
              <input
                type="number"
                value="65.0"
                step="0.1"
                class="rounded-xl border border-orange-300 bg-white px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-orange-400"
              />
            </label>
          </div>

          <!-- 活動レベル -->
          <label class="flex flex-col gap-1.5">
            <span class="text-sm font-medium text-zinc-700">活動レベル</span>
            <select class="rounded-xl border border-orange-300 bg-white px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-orange-400">
              <option>ほぼ運動しない</option>
              <option selected>軽い運動（週1〜3回）</option>
              <option>中程度の運動（週3〜5回）</option>
              <option>激しい運動（週6〜7回）</option>
              <option>非常に激しい運動</option>
            </select>
          </label>

          <!-- 変更点メモ -->
          <div class="rounded-xl bg-orange-50 border border-orange-200 px-4 py-3 text-xs text-zinc-600 leading-relaxed">
            <div class="font-semibold text-orange-700 mb-1">変更点</div>
            「年齢」入力欄は廃止され、<b>生年月日</b>の入力に置き換わりました。年齢は自動で更新されます。
          </div>
        </form>
      </main>

      <!-- 固定フッター -->
      <footer class="fixed bottom-0 left-0 right-0">
        <div class="mx-auto max-w-md px-6 pb-8 pt-4 bg-gradient-to-t from-orange-50 via-orange-50/95 to-transparent">
          <div class="flex gap-3">
            <button class="flex-1 rounded-full border border-orange-300 bg-white text-zinc-700 text-base font-medium py-3.5">
              キャンセル
            </button>
            <button class="flex-1 rounded-full bg-orange-500 text-white text-base font-medium py-3.5 shadow-md">
              保存
            </button>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
